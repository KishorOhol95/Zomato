<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Food Delivery App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1, h2 { color: #333; }
        form { margin-bottom: 20px; }
        input, button { padding: 5px; margin: 5px 0; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f2f2f2; margin: 5px 0; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Food Delivery Orders</h1>

    <form id="orderForm">
        <label>
            Item: <input type="text" id="item" required>
        </label><br>
        <label>
            Quantity: <input type="number" id="quantity" required min="1">
        </label><br>
        <button type="submit">Place Order</button>
    </form>

    <h2>Orders</h2>
    <ul id="ordersList"></ul>

    <script>
        const form = document.getElementById('orderForm');
        const ordersList = document.getElementById('ordersList');

        // Fetch and display existing orders
        async function loadOrders() {
            const response = await fetch('http://localhost:8080/orders');
            const orders = await response.json();
            ordersList.innerHTML = '';
            orders.forEach(displayOrder);
        }

        function displayOrder(order) {
            const li = document.createElement('li');
            li.textContent = `Order ${order.id}: ${order.item} x ${order.quantity} [${order.status}]`;
            ordersList.appendChild(li);
        }

        // Submit new order
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const item = document.getElementById('item').value;
            const quantity = parseInt(document.getElementById('quantity').value);

            const response = await fetch('http://localhost:8080/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item, quantity })
            });
            const order = await response.json();
            displayOrder(order);
            form.reset();
        });

        // Load orders on page load
        window.onload = loadOrders;
    </script>

</body>
</html>
